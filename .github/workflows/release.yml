name: Release On Main Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(tr -d '\n\r' < VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            Release automatica para ${{ steps.version.outputs.version }}

            - Codigo backend/frontend actualizado
            - Version sincronizada por archivo VERSION
          generate_release_notes: true
