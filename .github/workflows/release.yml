name: Release On Main Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(tr -d '\n\r' < VERSION)
          if [[ ! "$VERSION" =~ ^V[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid VERSION format: $VERSION"
            echo "Expected format: Vx.x.x"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists and is consistent
        id: tag_guard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.version.outputs.version }}"
          HEAD_SHA="${{ github.sha }}"

          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            TAG_SHA=$(git ls-remote --tags origin "refs/tags/${TAG}" | awk '{print $1}')

            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "Tag ${TAG} already exists and points to current commit."
              echo "release_needed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Tag ${TAG} already exists but points to ${TAG_SHA}, while HEAD is ${HEAD_SHA}."
            echo "Bump VERSION before pushing to main (example: V1.0.2)."
            exit 1
          fi

          git tag "${TAG}"
          git push origin "${TAG}"
          echo "release_needed=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag_guard.outputs.release_needed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            Release automatica para ${{ steps.version.outputs.version }}

            - Codigo backend/frontend actualizado
            - Version sincronizada por archivo VERSION
          generate_release_notes: true
