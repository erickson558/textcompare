name: Release On Main Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release files changed
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          CURRENT_SHA="${{ github.sha }}"

          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push detected. Skipping file-change validation."
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")

          if ! echo "$CHANGED_FILES" | grep -qx "VERSION"; then
            echo "VERSION was not updated in this push."
            echo "Every push to main must increment VERSION (Vx.x.x)."
            exit 1
          fi

          if ! echo "$CHANGED_FILES" | grep -qx "CHANGELOG.md"; then
            echo "CHANGELOG.md was not updated in this push."
            echo "Every push to main must document release notes."
            exit 1
          fi

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(tr -d '\n\r' < VERSION)
          if [[ ! "$VERSION" =~ ^V[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid VERSION format: $VERSION"
            echo "Expected format: Vx.x.x"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create unique tag for this commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.version.outputs.version }}"

          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists on origin."
            echo "Increment VERSION before pushing (example: V1.0.3)."
            exit 1
          fi

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            Release automatica para ${{ steps.version.outputs.version }}

            - Codigo backend/frontend actualizado
            - Version sincronizada por archivo VERSION
          generate_release_notes: true
